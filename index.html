<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nostressbutstretched</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #e8e7e7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 40px 20px;
  }

  .card {
    background: #faf6f1;
    width: 100%;
    max-width: 420px;
    border-radius: 24px;
    padding: 52px 40px 48px;
    position: relative;
    overflow: hidden;
  }

  /* deco circles */
  .card::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: #e8e7e7;
    opacity: .55;
    top: -80px; right: -70px;
  }
  .card::after {
    content: '';
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: #e8e7e7;
    opacity: .4;
    bottom: -50px; left: -40px;
  }

  /* header */
  .avatar {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, #9b8384, #c8b9b6);
    display: flex; align-items: center; justify-content: center;
    color: #faf6f1;
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    margin: 0 auto 18px;
    position: relative; z-index: 1;
  }

  .handle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 1px;
    color: #9b8384;
    opacity: .8;
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 1;
  }

  .brand-name {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 20px;
    color: #9b8384;
    text-align: center;
    letter-spacing: .5px;
    position: relative; z-index: 1;
  }

  .tagline {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    color: #9b8384;
    opacity: .75;
    text-align: center;
    margin-top: 8px;
    line-height: 1.7;
    position: relative; z-index: 1;
  }

  .deco-line {
    width: 36px; height: 1px;
    background: #9b8384;
    opacity: .4;
    margin: 24px auto;
    position: relative; z-index: 1;
  }

  /* links */
  .links { 
    display: flex; 
    flex-direction: column; 
    gap: 14px;
    position: relative; z-index: 1;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    border-radius: 14px;
    text-decoration: none;
    transition: transform .2s ease, box-shadow .2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .link-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(155,131,132,.18);
  }

  .link-item.dark {
    background: #9b8384;
    color: #faf6f1;
  }
  .link-item.light {
    background: #fff;
    color: #9b8384;
    border: 1px solid rgba(155,131,132,.2);
  }

  .link-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .dark .link-icon { background: rgba(250,246,241,.15); }
  .light .link-icon { background: rgba(155,131,132,.1); }

  .link-text { flex: 1; }
  .link-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 14.5px;
    line-height: 1.3;
    letter-spacing: .3px;
  }
  .link-sub {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    font-size: 11.5px;
    margin-top: 3px;
    opacity: .75;
    letter-spacing: .2px;
  }

  .link-arrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    opacity: .6;
    flex-shrink: 0;
  }

  /* footer */
  .footer {
    margin-top: 32px;
    text-align: center;
    position: relative; z-index: 1;
  }
  .footer-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: #9b8384;
    opacity: .6;
    letter-spacing: 1px;
  }
</style>
</head>

      <div class="link-text">

      <div class="link-icon">💬</div>
      <div class="link-text">

      </div>
      <div class="link-arrow">›</div>
    </a>

    <!-- Event Registration -->
    <a class="link-item light" href="#" target="_blank">
      <div class="link-icon">🏄🏽‍♀️</div>
      <div class="link-text">
        <div class="link-title">最新活動報名</div>
        <div class="link-sub">8月 沙灘直立板瑜珈 · 立即報名</div>
      </div>
      <div class="link-arrow">›</div>
    </a>

  </div>

  <div class="footer">
    <div class="footer-en">no stress, but stretched</div>
  </div>

</div>

</body>
</html>
